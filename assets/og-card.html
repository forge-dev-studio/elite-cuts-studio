<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200, initial-scale=1">
  <title>Elite Cuts Studio — Social Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bitter:ital,wght@0,400;0,700;1,600&family=Shrikhand&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #c8a24a;
      --red-deep: #8a6a24;
      --blue: #1c1c1c;
      --blue-dark: #0d0d0d;
      --cream: #f5f3ee;
      --cream-light: #faf8f4;
      --ink: #0a0a0a;
      --gold: #c9a24a;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 1200px;
      height: 630px;
      margin: 0;
      overflow: hidden;
    }

    body { background: var(--ink); }

    .card {
      position: relative;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 425px 775px;
      background: var(--blue-dark);
      isolation: isolate;
    }

    .pole {
      position: absolute;
      left: 0;
      z-index: 20;
      width: 1200px;
      height: 18px;
      background: repeating-linear-gradient(
        135deg,
        var(--red) 0 52px,
        var(--cream-light) 52px 104px,
        var(--blue) 104px 156px,
        var(--cream-light) 156px 208px
      );
      box-shadow: 0 2px 0 rgba(10,10,10,.8), 0 4px 0 var(--gold);
    }

    .pole.top { top: 0; }
    .pole.bottom { bottom: 0; transform: rotate(180deg); }

    .logo-panel {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 34% 35%, rgba(255,255,255,.92) 0 4%, transparent 32%),
        linear-gradient(145deg, var(--cream-light), var(--cream) 58%, #e5dfd3);
    }

    .logo-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: .28;
      background-image: radial-gradient(rgba(10, 10, 10,.42) .9px, transparent .9px);
      background-size: 12px 12px;
      mask-image: linear-gradient(90deg, #000, transparent 94%);
    }

    .logo-panel::after {
      content: "";
      position: absolute;
      right: -66px;
      top: -40px;
      width: 130px;
      height: 720px;
      background: var(--red);
      transform: rotate(7deg);
      box-shadow: 18px 0 0 var(--red-deep);
    }

    .badge-stage {
      position: relative;
      z-index: 3;
      width: 354px;
      height: 354px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--cream-light);
      border: 4px solid var(--red);
      box-shadow:
        0 0 0 7px var(--cream),
        0 0 0 11px var(--ink),
        0 0 0 15px var(--gold),
        15px 20px 0 rgba(10,10,10,.13),
        24px 34px 50px rgba(10,10,10,.26);
    }

    .badge-stage::before {
      content: "";
      position: absolute;
      inset: 13px;
      border: 2px dashed rgba(110, 84, 23,.48);
      border-radius: 50%;
    }

    .badge-stage img {
      width: 300px;
      height: 300px;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      border: 5px solid var(--ink);
      box-shadow: inset 0 0 0 2px var(--cream);
    }

    .established {
      position: absolute;
      z-index: 5;
      left: 50%;
      bottom: 54px;
      transform: translateX(-50%);
      width: 260px;
      padding: 8px 12px 7px;
      color: var(--ink);
      background: var(--gold);
      border: 2px solid var(--ink);
      box-shadow: 5px 6px 0 rgba(0,0,0,.55);
      font: 20px/1 "Bebas Neue", sans-serif;
      letter-spacing: 4px;
      text-align: center;
      white-space: nowrap;
    }

    .content {
      position: relative;
      overflow: hidden;
      padding: 55px 56px 46px 74px;
      color: var(--cream-light);
      background:
        radial-gradient(circle at 84% 6%, rgba(200, 162, 74,.96) 0, rgba(200, 162, 74,.3) 28%, transparent 49%),
        linear-gradient(115deg, var(--blue-dark) 0 55%, #050505 100%);
    }

    .content::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .28;
      background-image: radial-gradient(rgba(250,248,244,.46) .8px, transparent .8px);
      background-size: 13px 13px;
      mask-image: linear-gradient(115deg, transparent 0%, #000 54%, #000 100%);
    }

    .content::after {
      content: "";
      position: absolute;
      z-index: -1;
      right: -145px;
      bottom: -235px;
      width: 520px;
      height: 520px;
      border: 2px solid rgba(200, 162, 74,.26);
      border-radius: 50%;
      box-shadow:
        0 0 0 34px rgba(200, 162, 74,.07),
        0 0 0 66px rgba(201,162,74,.055),
        0 0 0 100px rgba(200, 162, 74,.035);
    }

    .eyebrow {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 13px;
      margin: 0 0 13px;
      color: #eee1c2;
      font: 21px/1 "Bebas Neue", sans-serif;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 45px;
      height: 2px;
      background: var(--gold);
    }

    h1 {
      position: relative;
      z-index: 2;
      margin: 0;
      font-family: "Shrikhand", cursive;
      font-weight: 400;
      font-size: 94px;
      line-height: .83;
      letter-spacing: .5px;
      text-shadow: 5px 7px 0 rgba(0,0,0,.28);
    }

    h1 .elite { display: block; color: var(--cream-light); }
    h1 .studio { display: block; color: #e6c76a; }

    .tagline {
      position: relative;
      z-index: 2;
      margin: 17px 0 20px;
      color: var(--cream);
      font: italic 600 20px/1.3 "Bitter", serif;
    }

    .services {
      position: relative;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      min-height: 46px;
      margin: 0 0 23px;
      padding: 0 18px;
      color: var(--ink);
      background: var(--cream-light);
      border-left: 6px solid var(--red);
      box-shadow: 7px 7px 0 rgba(0,0,0,.3);
      font: 18px/1 "Bebas Neue", sans-serif;
      letter-spacing: 1.75px;
      white-space: nowrap;
    }

    .footer-row {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding-top: 17px;
      border-top: 1px solid rgba(201,162,74,.62);
    }

    .nap { min-width: 0; }

    .address,
    .phone {
      margin: 0;
      font-family: "Bebas Neue", sans-serif;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .address {
      margin-bottom: 8px;
      color: rgba(250,248,244,.72);
      font-size: 18px;
      letter-spacing: 2.1px;
    }

    .phone {
      color: var(--cream-light);
      font-size: 29px;
      letter-spacing: 3px;
    }

    .seal {
      flex: 0 0 96px;
      width: 96px;
      height: 96px;
      border: 2px solid var(--gold);
      border-radius: 50%;
      display: grid;
      place-content: center;
      text-align: center;
      transform: rotate(5deg);
      box-shadow: inset 0 0 0 4px var(--blue-dark), inset 0 0 0 5px rgba(201,162,74,.44);
      color: #ead9b1;
      background: rgba(10,10,10,.2);
      font-family: "Bebas Neue", sans-serif;
      line-height: 1.02;
      letter-spacing: 1.8px;
    }

    .seal span { display: block; font-size: 13px; }
    .seal strong { display: block; margin: 4px 0; color: var(--cream-light); font-size: 24px; font-weight: 400; }

    .grain {
      position: absolute;
      z-index: 30;
      inset: 0;
      pointer-events: none;
      opacity: .13;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.86' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.32'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
    }
  </style>
</head>
<body>
  <main class="card" aria-label="Elite Cuts Studio social preview card">
    <div class="pole top"></div>

    <section class="logo-panel" aria-label="Elite Cuts Studio logo">
      <div class="badge-stage">
        <img src="logo.jpg" alt="Elite Cuts Studio barber pole logo">
      </div>
      <div class="established">EST. GAINESVILLE, GA</div>
    </section>

    <section class="content">
      <p class="eyebrow">Look Sharp <span>✦</span> Cut Elite</p>
      <h1><span class="elite">ELITE CUTS</span><span class="studio">STUDIO</span></h1>
      <p class="tagline">Premium Barbering in Gainesville, GA</p>
      <div class="services">CLASSIC CUTS · FADES · HOT TOWEL SHAVES · BEARD WORK</div>

      <div class="footer-row">
        <div class="nap">
          <p class="address">1706 M.L.K. Jr Blvd · Gainesville, GA</p>
          <p class="phone">(470) 290-5379</p>
        </div>
        <div class="seal" aria-label="Master Barbering Gainesville Georgia">
          <span>MASTER</span><strong>✦</strong><span>BARBERING<br>GAINESVILLE GA</span>
        </div>
      </div>
    </section>

    <div class="pole bottom"></div>
    <div class="grain"></div>
  </main>
</body>
</html>
